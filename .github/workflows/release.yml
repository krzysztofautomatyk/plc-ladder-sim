# Multi-platform installers → public GitHub Release (same pattern as ProjectToText)
# Trigger: git tag v* && git push origin v*
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Prefer Ayatana only — do not install both appindicator stacks (apt conflict).
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build installers & upload to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_id) }}
          releaseName: "PLC Ladder Simulator Pro ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}"
          releaseBody: |
            ## Installers

            Download the asset for your OS (same style as ProjectToText releases).

            | Platform | Packages |
            |----------|----------|
            | **Windows** | `.msi`, `.exe` (NSIS) |
            | **macOS** | `.dmg` (Apple Silicon + Intel) |
            | **Linux** | `.deb`, `.AppImage` |

            **Unsigned OSS builds** — macOS Gatekeeper / Windows SmartScreen may warn.
            See [docs/RELEASES.md](https://github.com/krzysztofautomatyk/plc-ladder-sim/blob/main/docs/RELEASES.md).
          # Public release (not draft) — packages visible on /releases like ProjectToText
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
