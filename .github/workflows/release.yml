# Multi-platform installers → public GitHub Release
# Pattern aligned with krzysztofautomatyk/ProjectToText (working reference).
# Trigger: git tag v* && git push origin v*
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libgtk-3-dev libayatana-appindicator3-dev

      - name: Verify Tauri icons present
        shell: bash
        run: |
          set -euo pipefail
          ls -la src-tauri/icons
          test -f src-tauri/icons/32x32.png
          test -f src-tauri/icons/128x128.png
          test -f "src-tauri/icons/128x128@2x.png"
          test -f src-tauri/icons/icon.icns
          test -f src-tauri/icons/icon.ico
          test -f src-tauri/icons/icon.png
          echo "All required icons OK"

      - name: Install frontend dependencies
        run: npm ci

      # releaseBody must be a single quoted string (ProjectToText lesson: multi-line
      # YAML maps break tauri-action / release creation on some runners).
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_id) }}
          releaseName: PLC Ladder Simulator Pro ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          releaseBody: "Prebuilt installers for Windows (.msi/.exe), macOS (.dmg arm64+x64), and Linux (.deb/.AppImage). Unsigned OSS builds — expect Gatekeeper/SmartScreen warnings. Docs: https://github.com/krzysztofautomatyk/plc-ladder-sim/blob/main/docs/RELEASES.md"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
